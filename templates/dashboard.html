<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YBS Dashboard · Young Boy Studios</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   ROOT TOKENS
═══════════════════════════════════════════ */
:root {
  --bg:     #07090e;
  --s1:     #0b0d16;
  --s2:     #10131e;
  --s3:     #151926;
  --bd:     rgba(255,255,255,0.055);
  --bd2:    rgba(255,255,255,0.10);
  --bd3:    rgba(255,255,255,0.16);
  --ac:     #7c6fff;
  --ac2:    #a998ff;
  --ac-g:   rgba(124,111,255,0.10);
  --gn:     #22d3a0;
  --rd:     #f05d7a;
  --yw:     #f5c842;
  --cy:     #34c8ff;
  --or:     #ff9040;
  --pk:     #e879b4;
  --tx:     #c4cae6;
  --tx2:    #8890b0;
  --mt:     #464e6e;
  --sw:     228px;
  --r:      12px;
  --rb:     8px;
}

/* ═══════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box }
html, body { height:100%; font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--tx); font-size:13px; overflow-x:hidden; line-height:1.5 }
button { font-family:'DM Sans',sans-serif; cursor:pointer }
a { text-decoration:none }
::-webkit-scrollbar { width:3px; height:3px }
::-webkit-scrollbar-track { background:transparent }
::-webkit-scrollbar-thumb { background:var(--bd2); border-radius:99px }
::selection { background:rgba(124,111,255,.3); color:#fff }

/* ═══════════════════════════════════════════
   LAYOUT
═══════════════════════════════════════════ */
.wrap { display:flex; min-height:100vh }
.main { flex:1; display:flex; flex-direction:column; min-width:0 }

/* ═══════════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════════ */
.sb {
  width:var(--sw);
  background:var(--s1);
  border-right:1px solid var(--bd);
  display:flex;
  flex-direction:column;
  flex-shrink:0;
  position:sticky;
  top:0;
  height:100vh;
  overflow-y:auto;
}

.sb-brand {
  padding:18px 14px 14px;
  display:flex;
  align-items:center;
  gap:10px;
  border-bottom:1px solid var(--bd);
  flex-shrink:0;
}
.sb-logo {
  width:36px; height:36px;
  border-radius:10px;
  background:linear-gradient(135deg,#7c6fff,#b89aff);
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
  position:relative;
}
.sb-logo::after {
  content:'';
  position:absolute; inset:-1px;
  border-radius:11px;
  background:linear-gradient(135deg,rgba(124,111,255,.4),rgba(184,154,255,.2));
  z-index:-1;
}
.sb-logo i { font-size:18px; color:#fff }
.sb-name { font-family:'Syne',sans-serif; font-size:13px; font-weight:800; color:#fff; letter-spacing:-.3px }
.sb-tag { font-size:10px; color:var(--mt); margin-top:1px; letter-spacing:.2px }

.sb-nav { flex:1; padding:8px 8px; overflow-y:auto }
.nl {
  font-size:9px; font-weight:700; color:var(--mt);
  text-transform:uppercase; letter-spacing:1.4px;
  padding:14px 8px 5px;
}
.nl:first-child { padding-top:8px }

.na {
  display:flex; align-items:center; gap:9px;
  padding:8px 10px; border-radius:var(--rb);
  color:var(--tx2); border:none; background:none;
  width:100%; text-align:left; font-size:12px; font-weight:500;
  transition:all .15s; margin-bottom:1px; position:relative;
}
.na:hover { background:var(--s2); color:var(--tx) }
.na.on {
  background:rgba(124,111,255,.12);
  color:var(--ac);
}
.na.on::before {
  content:'';
  position:absolute; left:0; top:6px; bottom:6px;
  width:2px; border-radius:0 2px 2px 0;
  background:var(--ac);
}
.na i { font-size:15px; width:18px; flex-shrink:0; opacity:.8 }
.na.on i { opacity:1 }
.na-lbl { flex:1 }

.na-badge {
  font-size:9px; font-weight:700;
  padding:1px 6px; border-radius:99px;
  min-width:18px; text-align:center;
}
.nba { background:rgba(124,111,255,.2); color:var(--ac2) }
.nbr { background:rgba(240,93,122,.18); color:var(--rd) }
.nbg { background:rgba(34,211,160,.15); color:var(--gn) }
.nby { background:rgba(245,200,66,.15); color:var(--yw) }
.nbc { background:rgba(52,200,255,.15); color:var(--cy) }
.nbp { background:rgba(232,121,180,.15); color:var(--pk) }

.sb-foot { padding:12px; border-top:1px solid var(--bd); flex-shrink:0 }
.bot-pill {
  display:flex; align-items:center; gap:10px;
  background:var(--s2); border:1px solid var(--bd);
  border-radius:var(--r); padding:10px 12px;
}
.pulse {
  width:8px; height:8px; border-radius:50%;
  background:var(--gn); flex-shrink:0;
  box-shadow:0 0 0 0 rgba(34,211,160,.5);
  animation:pulse 2.5s infinite;
}
.pulse.off { background:var(--rd); box-shadow:none; animation:none }
@keyframes pulse {
  0%   { box-shadow:0 0 0 0 rgba(34,211,160,.5) }
  70%  { box-shadow:0 0 0 7px rgba(34,211,160,0) }
  100% { box-shadow:0 0 0 0 rgba(34,211,160,0) }
}
.bot-name { font-family:'Syne',sans-serif; font-size:12px; font-weight:700; color:#fff }
.bot-st { font-size:10px; color:var(--gn) }
.bot-st.off { color:var(--rd) }

/* ═══════════════════════════════════════════
   LIVE TICKER (top of sidebar above nav)
═══════════════════════════════════════════ */
.ticker-wrap {
  border-bottom:1px solid var(--bd);
  overflow:hidden;
  height:30px;
  display:flex;
  align-items:center;
  background:rgba(34,211,160,.03);
  flex-shrink:0;
}
.ticker-label {
  font-size:9px; font-weight:700; color:var(--gn);
  text-transform:uppercase; letter-spacing:1px;
  padding:0 10px;
  white-space:nowrap;
  border-right:1px solid var(--bd);
  height:100%;
  display:flex;
  align-items:center;
  flex-shrink:0;
}
.ticker-scroll { flex:1; overflow:hidden; position:relative; height:100% }
.ticker-inner {
  display:flex;
  align-items:center;
  height:100%;
  white-space:nowrap;
  animation:ticker 28s linear infinite;
}
.ticker-item {
  font-size:10px;
  color:var(--tx2);
  padding:0 16px;
  display:flex;
  align-items:center;
  gap:5px;
}
.ticker-item i { font-size:11px }
@keyframes ticker {
  0%   { transform:translateX(0) }
  100% { transform:translateX(-50%) }
}

/* ═══════════════════════════════════════════
   TOPBAR
═══════════════════════════════════════════ */
.topbar {
  background:rgba(11,13,22,0.85);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--bd);
  padding:13px 24px;
  display:flex;
  align-items:center;
  gap:14px;
  position:sticky; top:0; z-index:200;
  flex-shrink:0;
}
.tb-crumb { display:flex; align-items:center; gap:6px }
.tb-crumb .tbc-root { font-size:11px; color:var(--mt) }
.tb-crumb .tbc-sep { font-size:10px; color:var(--mt) }
.tb-crumb .tbc-page { font-size:14px; font-family:'Syne',sans-serif; font-weight:700; color:#fff; letter-spacing:-.2px }
.tb-sub { font-size:11px; color:var(--mt); margin-left:2px }

.tb-right { margin-left:auto; display:flex; align-items:center; gap:8px }
.tb-clock {
  font-family:'JetBrains Mono',monospace;
  font-size:11px; color:var(--mt);
  background:var(--s2); border:1px solid var(--bd);
  padding:5px 12px; border-radius:99px;
  letter-spacing:.5px;
}
.tb-btn {
  background:var(--s2); border:1px solid var(--bd);
  color:var(--tx2); padding:6px 12px; border-radius:var(--rb);
  font-size:12px; display:flex; align-items:center; gap:5px;
  transition:all .15s;
}
.tb-btn:hover { border-color:var(--bd2); color:var(--tx) }
.tb-btn i { font-size:14px }
.tb-notif-btn {
  position:relative;
  background:var(--s2); border:1px solid var(--bd);
  color:var(--tx2); width:34px; height:34px;
  border-radius:var(--rb);
  display:flex; align-items:center; justify-content:center;
  transition:all .15s; flex-shrink:0;
}
.tb-notif-btn:hover { border-color:var(--bd2); color:var(--tx) }
.tb-notif-btn.has-unread { border-color:rgba(240,93,122,.3); color:var(--rd) }
.notif-pip {
  position:absolute; top:-3px; right:-3px;
  width:16px; height:16px; border-radius:50%;
  background:var(--rd); color:#fff;
  font-size:8px; font-weight:700;
  display:flex; align-items:center; justify-content:center;
  border:2px solid var(--s1);
  display:none;
}
.notif-pip.show { display:flex }

/* ═══════════════════════════════════════════
   NOTIFICATION PANEL
═══════════════════════════════════════════ */
.notif-panel {
  position:fixed;
  top:58px; right:16px;
  width:340px;
  background:var(--s1);
  border:1px solid var(--bd2);
  border-radius:var(--r);
  z-index:500;
  box-shadow:0 24px 64px rgba(0,0,0,.7);
  display:none;
  overflow:hidden;
}
.notif-panel.open {
  display:block;
  animation:popIn .18s ease;
}
@keyframes popIn {
  from { opacity:0; transform:translateY(-8px) scale(.98) }
  to   { opacity:1; transform:translateY(0) scale(1) }
}
.notif-ph {
  padding:13px 16px;
  border-bottom:1px solid var(--bd);
  display:flex; align-items:center; justify-content:space-between;
}
.notif-title { font-family:'Syne',sans-serif; font-weight:700; font-size:13px; color:#fff }
.notif-clear {
  font-size:11px; color:var(--ac);
  background:none; border:none; cursor:pointer; opacity:.7;
}
.notif-clear:hover { opacity:1 }
.notif-list { max-height:380px; overflow-y:auto }
.notif-item {
  display:flex; align-items:flex-start; gap:10px;
  padding:11px 16px;
  border-bottom:1px solid var(--bd);
  cursor:pointer; transition:background .1s;
  position:relative;
}
.notif-item:last-child { border-bottom:none }
.notif-item:hover { background:var(--s2) }
.notif-item.read { opacity:.45 }
.ni-icon {
  width:30px; height:30px; border-radius:9px;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
}
.ni-icon i { font-size:13px }
.ni-body { flex:1 }
.ni-msg { font-size:12px; color:var(--tx); font-weight:500; line-height:1.4 }
.ni-time { font-size:10px; color:var(--mt); margin-top:2px }
.ni-dot {
  width:6px; height:6px; border-radius:50%;
  background:var(--ac); flex-shrink:0; margin-top:5px;
}
.ni-dot.read { background:transparent }
.notif-empty { text-align:center; padding:30px; color:var(--mt); font-size:12px }

/* ═══════════════════════════════════════════
   CONTENT
═══════════════════════════════════════════ */
.content { padding:20px 24px; flex:1 }
.content > * { animation:fadeUp .25s ease both }
@keyframes fadeUp {
  from { opacity:0; transform:translateY(7px) }
  to   { opacity:1; transform:translateY(0) }
}

/* ═══════════════════════════════════════════
   STAT CARDS
═══════════════════════════════════════════ */
.sg { display:grid; grid-template-columns:repeat(5,1fr); gap:10px; margin-bottom:16px }
.sg.sg-4 { grid-template-columns:repeat(4,1fr) }

.sc {
  background:var(--s1);
  border:1px solid var(--bd);
  border-radius:var(--r);
  padding:16px 16px 14px;
  position:relative; overflow:hidden;
  cursor:default; transition:all .2s;
}
.sc:hover { border-color:var(--bd2); transform:translateY(-1px) }
.sc-top-bar { position:absolute; top:0; left:0; right:0; height:2px; border-radius:var(--r) var(--r) 0 0 }
.sc-trend {
  position:absolute; top:13px; right:13px;
  font-size:10px; font-weight:700;
  padding:2px 7px; border-radius:99px;
  display:flex; align-items:center; gap:3px;
}
.tup { background:rgba(34,211,160,.1); color:var(--gn) }
.tdn { background:rgba(240,93,122,.1); color:var(--rd) }
.tne { background:rgba(255,255,255,.05); color:var(--mt) }
.sc-icon {
  width:30px; height:30px; border-radius:9px;
  display:flex; align-items:center; justify-content:center;
  margin-bottom:12px;
}
.sc-icon i { font-size:15px }
.sc-val {
  font-family:'Syne',sans-serif;
  font-size:26px; font-weight:800; color:#fff;
  letter-spacing:-.5px; line-height:1;
}
.sc-lbl { font-size:10px; color:var(--mt); text-transform:uppercase; letter-spacing:.7px; margin-top:4px; font-weight:600 }

.spark { display:flex; align-items:flex-end; gap:2px; height:26px; margin-top:10px }
.spark-bar {
  flex:1; border-radius:2px 2px 0 0;
  min-width:3px;
  background:rgba(255,255,255,.05);
  transition:height .3s;
}
.spark-bar.hi { background:currentColor }

/* ═══════════════════════════════════════════
   GRID LAYOUTS
═══════════════════════════════════════════ */
.g2  { display:grid; grid-template-columns:1fr 300px; gap:12px; margin-bottom:12px }
.g22 { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px }
.g3  { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; margin-bottom:12px }

/* ═══════════════════════════════════════════
   PANELS
═══════════════════════════════════════════ */
.pn { background:var(--s1); border:1px solid var(--bd); border-radius:var(--r); overflow:hidden; margin-bottom:12px }
.pn.mb0 { margin-bottom:0 }
.ph {
  padding:13px 18px;
  border-bottom:1px solid var(--bd);
  display:flex; align-items:center; justify-content:space-between;
}
.pt { font-family:'Syne',sans-serif; font-size:12.5px; font-weight:700; color:#fff; display:flex; align-items:center; gap:7px }
.pt i { font-size:14px; color:var(--mt) }
.plink {
  font-size:11px; color:var(--ac);
  background:none; border:none; cursor:pointer;
  display:flex; align-items:center; gap:3px;
  opacity:.7; transition:opacity .15s;
}
.plink:hover { opacity:1 }
.plink i { font-size:11px }

/* ═══════════════════════════════════════════
   ACTIVITY FEED
═══════════════════════════════════════════ */
.al { max-height:360px; overflow-y:auto }
.ai {
  display:flex; align-items:center; gap:10px;
  padding:10px 18px;
  border-bottom:1px solid var(--bd);
  transition:background .1s;
  position:relative;
}
.ai:last-child { border-bottom:none }
.ai:hover { background:var(--s2) }
.ai.live-row::before {
  content:'';
  position:absolute; left:0; top:0; bottom:0; width:2px;
  background:var(--gn);
}
.ai-ico {
  width:30px; height:30px; border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
}
.ai-ico i { font-size:13px }
.ai-main { flex:1; min-width:0 }
.ai-act { font-size:12px; color:var(--tx); font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis }
.ai-det { font-size:11px; color:var(--mt); margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis }
.ai-time { font-size:10px; color:var(--mt); white-space:nowrap; flex-shrink:0 }
.live-dot {
  width:6px; height:6px; border-radius:50%;
  background:var(--gn); flex-shrink:0;
  box-shadow:0 0 0 0 rgba(34,211,160,.5);
  animation:livePulse 1.8s infinite;
}
@keyframes livePulse {
  0%   { box-shadow:0 0 0 0 rgba(34,211,160,.5) }
  70%  { box-shadow:0 0 0 5px rgba(34,211,160,0) }
  100% { box-shadow:0 0 0 0 rgba(34,211,160,0) }
}

/* New activity slide-in animation */
@keyframes slideInRow {
  from { background:rgba(34,211,160,.08); }
  to   { background:transparent; }
}
.ai.new-event { animation:slideInRow 2s ease forwards }

/* ═══════════════════════════════════════════
   XP / MEMBER ROWS
═══════════════════════════════════════════ */
.mr {
  display:flex; align-items:center; gap:10px;
  padding:10px 18px;
  border-bottom:1px solid var(--bd);
  transition:background .1s;
}
.mr:last-child { border-bottom:none }
.mr:hover { background:var(--s2) }
.rk { width:26px; text-align:center; font-size:13px; font-weight:700; color:var(--mt); flex-shrink:0 }
.av {
  width:32px; height:32px; border-radius:9px;
  display:flex; align-items:center; justify-content:center;
  font-size:12px; font-weight:700; color:#fff;
  flex-shrink:0; font-family:'Syne',sans-serif;
}
.m-info { flex:1; min-width:0 }
.m-name { font-size:12px; font-weight:600; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis }
.m-sub  { font-size:10px; color:var(--mt); margin-top:1px }
.xpb { height:3px; background:rgba(255,255,255,.06); border-radius:99px; overflow:hidden; margin-top:5px }
.xpf { height:100%; border-radius:99px; background:linear-gradient(90deg,var(--ac),#b89aff); transition:width .6s ease }

/* ═══════════════════════════════════════════
   BADGES
═══════════════════════════════════════════ */
.bg {
  display:inline-flex; align-items:center; gap:3px;
  padding:2px 8px; border-radius:6px;
  font-size:10px; font-weight:700; white-space:nowrap;
}
.bb  { background:rgba(124,111,255,.14); color:var(--ac2) }
.bgg { background:rgba(34,211,160,.12);  color:var(--gn) }
.br  { background:rgba(240,93,122,.12);  color:var(--rd) }
.by  { background:rgba(245,200,66,.12);  color:var(--yw) }
.bc  { background:rgba(52,200,255,.12);  color:var(--cy) }
.bp  { background:rgba(232,121,180,.12); color:var(--pk) }
.bo  { background:rgba(255,144,64,.12);  color:var(--or) }

/* ═══════════════════════════════════════════
   TABLES
═══════════════════════════════════════════ */
.tbl { width:100%; border-collapse:collapse }
.tbl th {
  padding:9px 18px; text-align:left;
  font-size:9px; font-weight:700; color:var(--mt);
  text-transform:uppercase; letter-spacing:.8px;
  background:rgba(255,255,255,.02);
  border-bottom:1px solid var(--bd);
}
.tbl td { padding:9px 18px; border-bottom:1px solid var(--bd); font-size:12px }
.tbl tr:last-child td { border-bottom:none }
.tbl tbody tr { transition:background .1s }
.tbl tbody tr:hover td { background:rgba(255,255,255,.02) }
.mono { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--mt) }

/* ═══════════════════════════════════════════
   MOD LOGS
═══════════════════════════════════════════ */
.ml {
  display:flex; align-items:flex-start; gap:12px;
  padding:11px 18px;
  border-bottom:1px solid var(--bd);
  transition:background .1s;
}
.ml:last-child { border-bottom:none }
.ml:hover { background:var(--s2) }
.ml-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; margin-top:5px }
.ml-action { font-size:12px; font-weight:600; color:#fff }
.ml-meta   { font-size:10px; color:var(--mt); margin-top:2px }

/* ═══════════════════════════════════════════
   CHART WRAPPERS
═══════════════════════════════════════════ */
.cw { padding:16px 18px }
.cw canvas { max-height:190px }
.cw-sm canvas { max-height:150px }

/* ═══════════════════════════════════════════
   TABS
═══════════════════════════════════════════ */
.tabs {
  display:flex; gap:4px; margin-bottom:12px;
  background:var(--s1); border:1px solid var(--bd);
  border-radius:10px; padding:4px; width:fit-content;
}
.tab {
  padding:6px 16px; border-radius:7px;
  cursor:pointer; font-size:11px; font-weight:600;
  color:var(--mt); transition:all .15s;
  border:none; background:none;
}
.tab.on { background:var(--ac); color:#fff }
.tab:hover:not(.on) { color:var(--tx) }

/* ═══════════════════════════════════════════
   SEARCH INPUT
═══════════════════════════════════════════ */
.srch {
  background:var(--s2); border:1px solid var(--bd);
  border-radius:var(--rb); padding:8px 12px;
  color:var(--tx); font-size:12px; width:100%;
  outline:none; transition:border-color .15s;
  font-family:'DM Sans',sans-serif;
}
.srch:focus { border-color:rgba(124,111,255,.4) }
.srch::placeholder { color:var(--mt) }

/* ═══════════════════════════════════════════
   EMPTY STATE
═══════════════════════════════════════════ */
.empty { text-align:center; padding:48px 20px; color:var(--mt) }
.empty i { font-size:42px; opacity:.25; display:block; margin-bottom:12px }
.empty p { font-size:13px; line-height:1.7 }
.empty code {
  background:var(--s2); padding:2px 7px;
  border-radius:5px; font-family:'JetBrains Mono',monospace;
  font-size:11px; color:var(--ac);
}

/* ═══════════════════════════════════════════
   SPECIAL CARDS
═══════════════════════════════════════════ */
.giveaway-card {
  margin:10px 18px;
  background:linear-gradient(135deg,rgba(232,121,180,.07),rgba(124,111,255,.07));
  border:1px solid rgba(232,121,180,.18);
  border-radius:10px; padding:14px 16px;
}
.gw-prize { font-family:'Syne',sans-serif; font-size:14px; font-weight:700; color:#fff; margin-bottom:4px }
.gw-meta  { font-size:11px; color:var(--mt) }

.ticket-card {
  margin:8px 16px;
  background:var(--s2); border:1px solid var(--bd);
  border-radius:10px; padding:12px 14px;
}
.tc-head { display:flex; align-items:center; gap:8px; margin-bottom:5px }
.tc-id { font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:600; color:var(--gn) }
.tc-title { font-size:12px; font-weight:600; color:#fff }
.tc-body { font-size:11px; color:var(--mt) }

.note-card {
  margin:8px 16px;
  background:var(--s2); border:1px solid var(--bd);
  border-radius:10px; padding:12px 14px;
  transition:border-color .15s;
}
.note-card:hover { border-color:rgba(124,111,255,.25) }
.note-by   { font-size:11px; font-weight:600; color:var(--ac) }
.note-time { font-size:10px; color:var(--mt) }
.note-text { font-size:12px; color:var(--tx); line-height:1.55; margin-top:5px }

.bug-card {
  background:var(--s1); border:1px solid var(--bd);
  border-radius:var(--r); margin-bottom:10px; overflow:hidden;
  transition:border-color .2s;
}
.bug-card:hover { border-color:rgba(240,93,122,.2) }
.bug-hd {
  padding:13px 18px; border-bottom:1px solid var(--bd);
  display:flex; align-items:center; gap:10px;
}
.bug-id { font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:600; color:var(--rd); background:rgba(240,93,122,.1); padding:2px 7px; border-radius:5px }
.bug-title { font-size:13px; font-weight:600; color:#fff; flex:1 }
.bug-body { padding:13px 18px }
.bug-fields { display:grid; grid-template-columns:repeat(3,1fr); gap:10px }
.bug-field label { font-size:9px; color:var(--mt); text-transform:uppercase; letter-spacing:.7px; display:block; margin-bottom:3px; font-weight:700 }
.bug-field p { font-size:12px; color:var(--tx) }
.bug-field.full { grid-column:1/-1 }

/* ═══════════════════════════════════════════
   ROBLOX GRID
═══════════════════════════════════════════ */
.roblox-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:12px; margin-bottom:14px }
.roblox-card {
  background:var(--s1); border:1px solid var(--bd);
  border-radius:var(--r); padding:16px;
  transition:border-color .2s;
}
.roblox-card:hover { border-color:rgba(52,200,255,.25) }
.rb-avatar {
  width:48px; height:48px; border-radius:50%;
  background:linear-gradient(135deg,var(--cy),var(--ac));
  display:flex; align-items:center; justify-content:center;
  font-size:20px; flex-shrink:0;
}
.rb-name { font-family:'Syne',sans-serif; font-size:13px; font-weight:700; color:#fff }
.rb-user { font-size:11px; color:var(--mt) }
.rb-id   { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--cy); margin-top:2px }
.rb-link {
  display:block; margin-top:12px;
  background:rgba(52,200,255,.08);
  border:1px solid rgba(52,200,255,.18);
  color:var(--cy); border-radius:8px;
  padding:7px; font-size:11px; font-weight:600;
  text-align:center;
  transition:background .15s;
}
.rb-link:hover { background:rgba(52,200,255,.15) }

/* ═══════════════════════════════════════════
   WORD FILTER
═══════════════════════════════════════════ */
.word-list { display:flex; flex-wrap:wrap; gap:7px; padding:16px 18px }

  background:rgba(240,93,122,.1); color:var(--rd);
  border:1px solid rgba(240,93,122,.18);
  padding:3px 10px; border-radius:6px;

/* ═══════════════════════════════════════════

═══════════════════════════════════════════ */
.foot {

.foot span { color:var(--ac); font-weight:600 }

/* ═══════════════════════════════════════
   NOTIFICATIONS
═══════════════════════════════════════ */
let readIds = JSON.parse(localStorage.getItem('ybs_read') || '[]');
let notifData = ACTIVITY.slice(0, 8).map((e, i) => ({ id:`notif_${i}`, icon:e.icon, color:e.color, msg:e.action, detail:e.detail, time:e.time }));

function renderNotifs() {
  const list = document.getElementById('notifList');
  const pip  = document.getElementById('notifPip');
  const btn  = document.getElementById('notifToggle');
  const unread = notifData.filter(n => !readIds.includes(n.id)).length;

  pip.textContent = unread;
  pip.classList.toggle('show', unread > 0);
  btn.classList.toggle('has-unread', unread > 0);

  if (!notifData.length) { list.innerHTML = '<div class="notif-empty">All clear</div>'; return; }

  list.innerHTML = notifData.map(n => {
    const read = readIds.includes(n.id);
    return `<div class="notif-item${read?' read':''}" onclick="markRead('${n.id}')">
      <div class="ni-icon" style="background:${n.color}15"><i class="ti ${n.icon}" style="color:${n.color};font-size:13px"></i></div>
      <div class="ni-body">
        <div class="ni-msg">${n.msg}</div>
        <div class="ni-time">${n.detail} · ${n.time}</div>
      </div>
      <div class="ni-dot${read?' read':''}"></div>
    </div>`;
  }).join('');
}

function markRead(id) {
  if (!readIds.includes(id)) { readIds.push(id); localStorage.setItem('ybs_read', JSON.stringify(readIds)); }
  renderNotifs();
}

function clearNotifs() {
  readIds = notifData.map(n => n.id);
  localStorage.setItem('ybs_read', JSON.stringify(readIds));
  renderNotifs();
}

function toggleNotif() {
  const p = document.getElementById('notifPanel');
  p.classList.toggle('open');
}

document.addEventListener('click', e => {
  const p = document.getElementById('notifPanel');
  const b = document.getElementById('notifToggle');
  if (p.classList.contains('open') && !p.contains(e.target) && !b.contains(e.target)) {
    p.classList.remove('open');
  }
});

renderNotifs();

/* ═══════════════════════════════════════
   ANIMATED COUNTER
═══════════════════════════════════════ */
function animateCount(el, target, duration = 700) {
  const start = performance.now();
  const from  = 0;
  function step(now) {
    const prog = Math.min((now - start) / duration, 1);
    const ease = 1 - Math.pow(1 - prog, 3); // cubic ease out
    el.textContent = Math.round(from + (target - from) * ease).toLocaleString();
    if (prog < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

/* ═══════════════════════════════════════
   BUILD: STAT CARD
═══════════════════════════════════════ */
function statCard(s, i) {
  const max  = Math.max(...s.spark);
  const bars = s.spark.map((v, j) => {
    const pct = max > 0 ? Math.round((v / max) * 100) : 0;
    const hi  = j === s.spark.length - 1 ? 'hi' : '';
    return `<div class="spark-bar ${hi}" style="height:${pct}%;${hi ? `color:${s.color}` : ''}"></div>`;
  }).join('');

  let trendHtml = '';
  if (s.trend) {
    const cls = s.trend === '0' ? 'tne' : (s.up ? 'tup' : 'tdn');
    const ico = s.trend === '0' ? 'ti-minus' : (s.up ? 'ti-trending-up' : 'ti-trending-down');
    trendHtml = `<div class="sc-trend ${cls}"><i class="ti ${ico}" style="font-size:9px"></i>${s.trend}</div>`;
  }

  return `<div class="sc" style="animation-delay:${i * 35}ms">
    <div class="sc-top-bar" style="background:${s.color}"></div>
    ${trendHtml}
    <div class="sc-icon" style="background:${s.color}15">
      <i class="ti ${s.icon}" style="color:${s.color}"></i>
    </div>
    <div class="sc-val" data-target="${s.val}" data-animated="false">0</div>
    <div class="sc-lbl">${s.label}</div>
    <div class="spark" style="color:${s.color}">${bars}</div>
  </div>`;
}

/* ═══════════════════════════════════════
   BUILD: ACTIVITY ROW
═══════════════════════════════════════ */
function actRow(e, showLive) {
  return `<div class="ai${showLive ? ' live-row' : ''}">
    ${showLive ? '<div class="live-dot"></div>' : ''}
    <div class="ai-ico" style="background:${e.color}15">
      <i class="ti ${e.icon}" style="color:${e.color}"></i>
    </div>
    <div class="ai-main">
      <div class="ai-act">${e.action}</div>
      <div class="ai-det">${e.detail}</div>
    </div>
    <div class="ai-time">${e.time}</div>
  </div>`;
}

/* ═══════════════════════════════════════
   BUILD: XP MEMBER ROW
═══════════════════════════════════════ */
function xpRow(m, i) {
  const medal = i < 3 ? MEDALS[i] : `<span style="font-size:11px">${i + 1}</span>`;
  return `<div class="mr" style="animation-delay:${i*40}ms">
    <div class="rk">${medal}</div>
    <div class="av" style="background:${m.color}">${m.name[0]}</div>
    <div class="m-info">
      <div class="m-name">${m.name}</div>
      <div class="m-sub">${m.xp.toLocaleString()} XP</div>
      <div class="xpb"><div class="xpf" style="width:0%" data-fill="${m.pct}"></div></div>
    </div>
    <span class="bg bb">Lv ${m.level}</span>
  </div>`;
}

/* ═══════════════════════════════════════
   XP BAR ANIMATION (runs after paint)
═══════════════════════════════════════ */
function animateBars() {
  requestAnimationFrame(() => {
    document.querySelectorAll('.xpf[data-fill]').forEach(el => {
      const target = el.dataset.fill;
      setTimeout(() => { el.style.width = target + '%'; }, 100);
    });
  });
}

/* ═══════════════════════════════════════
   COUNTER ANIMATION trigger
═══════════════════════════════════════ */
function animateCounters() {
  document.querySelectorAll('.sc-val[data-animated="false"]').forEach((el, i) => {
    const target = parseInt(el.dataset.target, 10);
    el.dataset.animated = 'true';
    setTimeout(() => animateCount(el, target, 600), i * 40);
  });
}

/* ═══════════════════════════════════════
   CHART BUILDERS (post-render)
═══════════════════════════════════════ */
function buildCharts(page) {
  const gridColor = 'rgba(255,255,255,0.04)';
  const tickColor = '#464e6e';

  if (page === 'home') {
    requestAnimationFrame(() => {
      mkChart('roleChart', {
        type:'doughnut',
        data:{
          labels:Object.keys(ROLE_DATA),
          datasets:[{data:Object.values(ROLE_DATA),backgroundColor:CHART_COLORS,borderWidth:0,hoverOffset:5}]
        },
        options:{
          plugins:{legend:{position:'bottom',labels:{color:tickColor,font:{size:10},padding:10}}},
          cutout:'66%',animation:{duration:700}
        }
      });
    });
  }

  if (page === 'analytics') {
    requestAnimationFrame(() => {
      mkChart('analyticsRole', {
        type:'bar',
        data:{labels:Object.keys(ROLE_DATA),datasets:[{data:Object.values(ROLE_DATA),backgroundColor:CHART_COLORS,borderRadius:6,borderWidth:0}]},
        options:{
          plugins:{legend:{display:false}},
          scales:{
            x:{ticks:{color:tickColor},grid:{display:false}},
            y:{ticks:{color:tickColor},grid:{color:gridColor}}
          }
        }
      });
      mkChart('analyticsMod', {
        type:'doughnut',
        data:{labels:Object.keys(MOD_ACT_DATA),datasets:[{data:Object.values(MOD_ACT_DATA),backgroundColor:['#f5c842','#f05d7a','#7c6fff','#ff9040'],borderWidth:0}]},
        options:{plugins:{legend:{position:'bottom',labels:{color:tickColor,font:{size:10}}}},cutout:'60%'}
      });
      mkChart('analyticsGrowth', {
        type:'line',
        data:{
          labels:['Apr 30','May 1','May 2','May 3','May 4','May 5','May 6','May 7','May 8','May 9'],
          datasets:[{
            label:'Events',data:[18,24,20,31,28,35,30,38,42,47],
            borderColor:'#7c6fff',backgroundColor:'rgba(124,111,255,0.07)',
            fill:true,tension:0.4,pointBackgroundColor:'#7c6fff',pointRadius:3,pointBorderWidth:0
          }]
        },
        options:{
          plugins:{legend:{display:false}},
          scales:{
            x:{ticks:{color:tickColor},grid:{display:false}},
            y:{ticks:{color:tickColor},grid:{color:gridColor},beginAtZero:true}
          }
        }
      });
    });
  }
}

/* ═══════════════════════════════════════
   PAGE TITLES
═══════════════════════════════════════ */
const PAGE_TITLES = {
  home:'Overview', activity:'Live Activity', applications:'Applications',
  warnings:'Warnings', notes:'Staff Notes', members:'Members',
  leaderboard:'Leaderboard', modlogs:'Mod Logs', automod:'Auto-Mod',
  tickets:'Tickets', bugs:'Bug Reports', giveaways:'Giveaways',
  voice:'Voice Log', economy:'Economy', analytics:'Analytics',
  roblox:'Roblox Profiles', premium:'Premium Members',
};

/* ═══════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════ */
let currentPage = 'home';

const PAGE_FNS = {
  home:pageHome, activity:pageActivity, applications:pageApplications,
  warnings:pageWarnings, notes:pageNotes, members:pageMembers,
  leaderboard:pageLeaderboard, modlogs:pageModlogs, automod:pageAutomod,
  tickets:pageTickets, bugs:pageBugs, giveaways:pageGiveaways,
  voice:pageVoice, economy:pageEconomy, analytics:pageAnalytics,
  roblox:pageRoblox, premium:pagePremium,
};

function nav(page, btn) {
  currentPage = page;

  // Update nav highlight
  document.querySelectorAll('.na').forEach(b => b.classList.remove('on'));
  if (btn) btn.classList.add('on');

  // Update topbar
  document.getElementById('pageTitle').textContent = PAGE_TITLES[page] || page;

  // Render
  const fn = PAGE_FNS[page];
  document.getElementById('content').innerHTML = fn ? fn() : emptyState('ti-tool','Page not found.');

  // Post-render hooks
  buildCharts(page);
  animateCounters();
  animateBars();
}

/* ═══════════════════════════════════════
   SIMULATED LIVE EVENTS
   Injects a new activity row every ~12s
═══════════════════════════════════════ */
const FAKE_EVENTS = [
  { icon:'ti-bolt',           color:'#7c6fff', action:'XP milestone reached', detail:'NightWolf hit Level 19' },
  { icon:'ti-coin',           color:'#f5c842', action:'Daily reward claimed',  detail:'StormCraft claimed 250 coins' },
  { icon:'ti-brand-google-play',color:'#34c8ff',action:'New Roblox link',    detail:'PlanetBuild linked @planetbuild_rblx' },
  { icon:'ti-ticket',         color:'#22d3a0', action:'Ticket closed',        detail:'#041 resolved by Admin' },
  { icon:'ti-users',          color:'#7c6fff', action:'Member joined',         detail:'ByteBuilder just joined the server' },
];

let fakeIdx = 0;
setInterval(() => {
  const e = FAKE_EVENTS[fakeIdx % FAKE_EVENTS.length];
  fakeIdx++;
  e.time = 'just now';

  // Prepend to data
  ACTIVITY.unshift(e);
  if (ACTIVITY.length > 50) ACTIVITY.pop();

  // Refresh if on activity/home page
  if (currentPage === 'activity' || currentPage === 'home') {
    const feed = document.querySelector('.al');
    if (feed) {
      const row = document.createElement('div');
      row.innerHTML = actRow(e, true);
      const inner = row.firstElementChild;
      inner.classList.add('new-event');
      feed.prepend(inner);
      // Remove old rows past 15 on home
      if (currentPage === 'home') {
        const rows = feed.querySelectorAll('.ai');
        if (rows.length > 15) rows[rows.length-1].remove();
      }
    }
  }

  // Update footer count
  const fc = document.getElementById('footCount');
  if (fc) fc.textContent = ACTIVITY.length;
}, 12000);

/* ═══════════════════════════════════════
   AUTO REFRESH
═══════════════════════════════════════ */
setTimeout(() => location.reload(), 30000);

/* ═══════════════════════════════════════
   INITIAL LOAD
═══════════════════════════════════════ */
nav('home', document.querySelector('.na.on'));
</script>
